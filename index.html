<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruSea Fish — Fresh Daily Catch</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #0a1628;
  --bg2: #0d2137;
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.13);
  --glass-hover: rgba(255,255,255,0.12);
  --teal: #2dd4b0;
  --teal-dim: rgba(45,212,176,0.15);
  --accent: #4ade80;
  --orange: #fb923c;
  --blue: #60a5fa;
  --text: #f0f4f8;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.35);
  --in-c: #4ade80;
  --in-bg: rgba(74,222,128,0.12);
  --out-c: #60a5fa;
  --out-bg: rgba(96,165,250,0.12);
  --r: 18px;
}

.catalog-end {
  grid-column: 1 / -1;
  text-align: center;
  margin-top: 20px;
  padding: 30px 10px 10px;
  color: var(--text2);
  font-size: 13px;
}

.scroll-top-btn {
  margin-top: 12px;
  padding: 10px 18px;
  border-radius: 100px;
  border: 0.5px solid var(--glass-border);
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.scroll-top-btn:hover {
  background: var(--glass-hover);
  color: var(--teal);
  transform: translateY(-2px);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: linear-gradient(160deg, #0a1628 0%, #0d2a4a 50%, #0a1628 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Nunito Sans', sans-serif;
  min-height: 100vh;
}

/* HEADER */
header {
  background: #ffffff;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--glass-border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: auto;
  padding-top: 10px;
  padding-bottom: 10px;
}

.logo-img { height: 44px; max-width: 160px; object-fit: contain; display: block; }
.logo-text { font-size: 1.4rem; font-weight: 700; color: var(--text); }
.logo-text em { font-style: italic; color: var(--teal); }

.logo-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
}

.live-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(11,51,38,0.08);
  border: 1px solid rgba(11,51,38,0.15);
  border-radius: 100px;
  padding: 3px 10px 3px 8px;
  font-size: 10px;
  color: #0a1729;
  letter-spacing: 0.2px;
}

.pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.65); }
}

/* HERO */
.hero {
  text-align: center;
  padding: 32px 20px 26px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(45,212,176,0.12) 0%, transparent 65%);
  pointer-events: none;
}

.hero-eyebrow { font-size: 10.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); font-weight: 600; margin-bottom: 10px; }
.hero h1 { font-size: clamp(1.7rem,4vw,2.4rem); font-weight: 700; color: var(--text); line-height: 1.15; }
.hero-sub { margin-top: 8px; font-size: 13px; color: var(--text2); font-weight: 400; }

/* CONTROLS */
.controls {
  max-width: 1120px;
  margin: 0 auto;
  padding: 16px 20px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.pill {
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  color: var(--text2);
  padding: 7px 16px;
  border-radius: 100px;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.16s;
}

.pill:hover { background: var(--glass-hover); color: var(--text); }
.pill.on { background: var(--teal); border-color: var(--teal); color: #0a1628; }

.search-wrap { margin-left: auto; position: relative; display: flex; align-items: center; flex-shrink: 0; }

.search-toggle {
  width: 36px; height: 36px;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 100px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}

.search-toggle:hover { background: var(--glass-hover); }

.search {
  width: 0; opacity: 0; padding: 0; border: none;
  pointer-events: none;
  transition: all 0.25s ease;
  border-radius: 100px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  background: var(--glass);
  outline: none;
}

.search.open {
  width: 160px; opacity: 1;
  padding: 7px 14px;
  border: 0.5px solid var(--glass-border);
  pointer-events: auto;
  margin-right: 6px;
  backdrop-filter: blur(12px);
}

.search::placeholder { color: var(--text3); }

/* CATALOG */
.catalog {
  max-width: 1120px;
  margin: 0 auto;
  padding: 14px 20px 150px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.state-box { grid-column:1/-1; text-align:center; padding:90px 20px; color:var(--text3); }

.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--glass-border);
  border-top-color: var(--teal);
  border-radius: 50%;
  margin: 0 auto 14px;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg); } }

/* CARD */
.card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
  animation: fadeUp 0.38s ease both;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(45,212,176,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.card.oos { opacity: 1; }

.card-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  overflow: hidden;
  background: linear-gradient(135deg, rgba(45,212,176,0.15) 0%, rgba(96,165,250,0.1) 100%);
}

.card-img {
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
  transition: transform 0.4s ease;
  background: rgba(0,0,0,0.2);
}

.card:hover .card-img { transform: scale(1.04); }

.card-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
}

.stock-tag {
  position: absolute;
  top: 10px; right: 10px;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  backdrop-filter: blur(8px);
}

.stock-tag.in  { background: var(--in-bg);  color: var(--in-c);  border: 0.5px solid rgba(74,222,128,0.3); }
.stock-tag.out { background: var(--out-bg); color: var(--out-c); border: 0.5px solid rgba(96,165,250,0.3); }

.card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; flex: 1; }

.card-name { font-size: 1.15rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.card-variant-label { font-size: 11px; color: var(--teal); font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; text-transform: uppercase; }

.specs {
  display: flex;
  flex-wrap: wrap;
  margin-top: 10px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  border-top: 0.5px solid var(--glass-border);
  padding-top: 10px;
}

.spec-item { display: flex; align-items: center; }
.spec-item:not(:last-child)::after { content: '|'; margin: 0 7px; color: var(--text3); }
.spec-label { color: var(--text); opacity: 0.75; margin-right: 4px; font-size: 11px; font-weight: 700; }
.spec-val   { font-weight: 700; color: var(--text); }

.variant-section { margin-top: 12px; }
.variant-label-row { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); font-weight: 700; margin-bottom: 7px; }
.variant-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 6px; }

.var-btn {
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
  text-align: center;
  justify-content: center;
}

.var-btn:hover { background: var(--glass-hover); color: var(--text); border-color: var(--teal); }
.var-btn.sel   { background: var(--teal); border-color: var(--teal); color: #0a1628; }
.var-btn.oos-v { opacity:0.4; cursor:not-allowed; }

.var-btn small { display: block; font-size: 11.5px; font-weight: 600; opacity: 1; }

.price-row { margin-top: 13px; display: flex; align-items: baseline; gap: 6px; }
.price-main { font-size: 1.5rem; font-weight: 700; color: var(--orange); }
.price-note { font-size: 11px; color: var(--text2); font-weight: 400; }

/* Addon — toggle style */
.addon-row {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.addon-row:hover { background: var(--glass-hover); }
.addon-cb { width: 16px; height: 16px; accent-color: var(--teal); cursor: pointer; flex-shrink: 0; }
.addon-text { font-size: 12.5px; color: var(--text2); font-weight: 600; flex: 1; }
.addon-price { font-size: 12px; color: var(--teal); font-weight: 700; }

.extra-section { margin-top: 9px; }
.extra-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  background: var(--glass);
  border: 0.5px solid rgba(251,146,60,0.25);
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.extra-toggle:hover { background: var(--glass-hover); }
.extra-cb { width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; flex-shrink: 0; }
.extra-toggle-text { font-size: 12.5px; color: var(--text2); font-weight: 600; flex: 1; }
.extra-toggle-price { font-size: 12px; color: var(--teal); font-weight: 700; }

.extra-counter { display: none; align-items: center; justify-content: center; gap: 0; margin-top: 8px; }
.extra-counter.show { display: flex; }

.ec-btn {
  width: 34px; height: 34px;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.14s;
  font-weight: 300;
}

.ec-btn:first-child { border-radius: 8px 0 0 8px; }
.ec-btn:last-child  { border-radius: 0 8px 8px 0; }
.ec-btn:hover       { background: var(--glass-hover); color: var(--teal); }

.ec-val {
  min-width: 42px; height: 34px;
  border-top: 0.5px solid var(--glass-border);
  border-bottom: 0.5px solid var(--glass-border);
  display: flex; align-items:center; justify-content:center;
  font-size: 14px; font-weight: 700; color: var(--text);
  background: rgba(255,255,255,0.04);
}

.ec-label { margin-left: 10px; font-size: 12px; color: var(--text3); }

.ideal-row { margin-top: 10px; font-size: 12.5px; color: var(--text2); line-height: 1.5; }
.ideal-row strong { color: var(--text); font-weight: 700; }
.delivery-row { margin-top: 4px; font-size: 12px; color: var(--text2); }
.delivery-row strong { color: var(--text2); }

/* CARD FOOTER */
.card-footer {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 0.5px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.add-btn {
  background: var(--teal);
  border: none;
  color: #0a1628;
  padding: 10px 0;
  border-radius: 10px;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  width: 120px;
  text-align: center;
  display: inline-block;
}

.add-btn:hover { background: #22c4a0; transform: scale(1.03); }
.add-btn.prebook-btn { background: var(--blue); color: #0a1628; }
.add-btn.prebook-btn:hover { background: #3b82f6; }
.add-btn:disabled { background: var(--glass); color: var(--text3); cursor: not-allowed; transform: none; }

.qty-ctrl { display: none; align-items: center; }
.qty-ctrl.show { display: flex; }

.qc-btn {
  width: 36px; height: 36px;
  background: var(--teal);
  border: none;
  color: #0a1628;
  font-size: 20px;
  font-weight: 300;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: background 0.14s;
}
.qc-btn:first-child { border-radius: 10px 0 0 10px; }
.qc-btn:last-child  { border-radius: 0 10px 10px 0; }
.qc-btn:hover       { background: #22c4a0; }

.qc-val {
  min-width: 40px; height: 36px;
  background: rgba(45,212,176,0.1);
  border-top: 0.5px solid var(--teal);
  border-bottom: 0.5px solid var(--teal);
  display: flex; align-items:center; justify-content:center;
  font-size: 14px; font-weight: 700; color: var(--teal);
}

/* CART FAB */
.cart-fab {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform: translateX(-50%) translateY(20px);
}

.cart-fab.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}

.cart-btn {
  background: linear-gradient(135deg, #1a9b7a, #15806a);
  border: 0.5px solid rgba(45,212,176,0.4);
  color: #fff;
  padding: 13px 28px;
  border-radius: 100px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(45,212,176,0.2);
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
  transition: transform 0.15s;
}

.cart-btn:hover { transform: scale(1.04); }

.cart-badge {
  background: var(--orange);
  color: #fff;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 12px;
  font-weight: 700;
  display: flex; align-items:center; justify-content:center;
}

/* DRAWER */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s;
  backdrop-filter: blur(6px);
}
.overlay.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 560px;
  margin: 0 auto;
  background: rgba(13,33,55,0.97);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-radius: 22px 22px 0 0;
  border-top: 0.5px solid var(--glass-border);
  z-index: 301;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
}
.drawer.open { transform: translateY(0); }

.drawer-handle { width: 38px; height: 4px; background: var(--glass-border); border-radius: 2px; margin: 11px auto 0; }

.drawer-head {
  padding: 14px 20px 12px;
  border-bottom: 0.5px solid var(--glass-border);
  display: flex; align-items: center; justify-content: space-between;
}

.drawer-title { font-size: 1.2rem; font-weight: 700; color: var(--text); }

.close-btn {
  background: var(--glass);
  border: none;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 15px;
  color: var(--text2);
  display: flex; align-items:center; justify-content:center;
  transition: background 0.14s;
}
.close-btn:hover { background: var(--glass-hover); }

.drawer-body { flex: 1; overflow-y: auto; padding: 4px 20px 8px; }

.order-item {
  padding: 12px 0;
  border-bottom: 0.5px solid var(--glass-border);
  display: flex; align-items: flex-start; gap: 10px;
}

.oi-info { flex: 1; }
.oi-name { font-size: 13.5px; font-weight: 700; color: var(--text); }
.oi-detail { font-size: 11.5px; color: var(--text3); margin-top: 2px; line-height: 1.5; }
.oi-price { font-size: 14px; font-weight: 700; color: var(--teal); white-space: nowrap; }

.rm-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 17px; padding: 2px 4px; transition: color 0.14s; line-height: 1; }
.rm-btn:hover { color: #ef4444; }

.empty-cart { text-align: center; padding: 50px 20px; color: var(--text3); font-size: 13.5px; }
.empty-cart .big { font-size: 40px; margin-bottom: 10px; }

.customer-section {
  padding: 12px 20px;
  border-top: 0.5px solid var(--glass-border);
  background: rgba(255,255,255,0.02);
}

.section-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); font-weight: 700; margin-bottom: 9px; }

.input-row { display: flex; gap: 8px; }

.field {
  flex: 1;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 10px;
  padding: 9px 13px;
  font-family: inherit;
  font-size: 13.5px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.field:focus { border-color: var(--teal); }
.field::placeholder { color: var(--text3); }

.drawer-foot { padding: 12px 20px 24px; border-top: 0.5px solid var(--glass-border); }

.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 13px; }
.total-label { font-size: 13px; color: var(--text2); font-weight: 600; }
.total-val { font-size: 1.6rem; font-weight: 700; color: var(--teal); }

.wa-btn {
  width: 100%;
  background: #25D366;
  border: none;
  color: #fff;
  padding: 14px;
  border-radius: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  box-shadow: 0 4px 20px rgba(37,211,102,0.25);
  transition: all 0.18s;
}
.wa-btn:hover { background: #1db954; }
.wa-icon { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

.addr-field {
  width: 100%;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 10px;
  padding: 9px 13px;
  font-family: inherit;
  font-size: 13.5px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  resize: none;
  margin-top: 8px;
}
.addr-field:focus { border-color: var(--teal); }
.addr-field::placeholder { color: var(--text3); }

.map-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }

.map-input {
  flex: 1;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 10px;
  padding: 9px 13px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.map-input:focus { border-color: var(--teal); }
.map-input::placeholder { color: var(--text3); }

.loc-btn {
  background: var(--teal-dim);
  border: 0.5px solid rgba(45,212,176,0.3);
  border-radius: 10px;
  padding: 9px 13px;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--teal);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.16s;
  display: flex; align-items: center; gap: 5px;
}
.loc-btn:hover { background: var(--teal); color: #0a1628; }

.submit-status { margin-top: 8px; font-size: 12px; text-align: center; min-height: 18px; color: var(--teal); font-weight: 600; }

.cfg-notice { max-width: 1120px; margin: 16px auto 0; padding: 0 20px; display: none; }
.cfg-box {
  background: rgba(251,191,36,0.08);
  border: 0.5px solid rgba(251,191,36,0.3);
  border-radius: 12px;
  padding: 13px 16px;
  font-size: 13px;
  color: #fbbf24;
  line-height: 1.6;
}
.cfg-box strong { display: block; margin-bottom: 3px; font-size: 13.5px; }
.cfg-box code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

/* ── Slice variant buttons (Large/Medium Slices) ── */
.slice-variant-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.slice-var-btn {
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 100px;
  padding: 5px 13px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}

.slice-var-btn:hover { background: var(--glass-hover); color: var(--text); }
.slice-var-btn.sel   { background: rgba(45,212,176,0.18); border-color: var(--teal); color: var(--teal); }

/* ── Meena Rani AI Overlay ── */
#meena-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}

#meena-overlay.open {
  display: flex;
  flex-direction: column;
}

#meena-overlay.visible {
  opacity: 1;
}

.meena-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    #020b18 0%,
    #041428 15%,
    #031a3a 35%,
    #052545 55%,
    #062e50 75%,
    #0a3a60 100%
  );
  overflow: hidden;
}

/* Animated ocean rays */
.meena-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(45,212,176,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 60%, rgba(96,165,250,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 80% 30% at 50% 100%, rgba(45,212,176,0.12) 0%, transparent 50%);
  animation: oceanPulse 6s ease-in-out infinite alternate;
}

@keyframes oceanPulse {
  0%   { opacity: 0.6; transform: scale(1); }
  100% { opacity: 1;   transform: scale(1.05); }
}

/* Bubble particles */
.meena-bubbles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(45,212,176,0.15);
  border: 0.5px solid rgba(45,212,176,0.3);
  animation: rise linear infinite;
}

@keyframes rise {
  0%   { transform: translateY(0) scale(1); opacity: 0.7; }
  100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
}

/* Caustics light patterns */
.meena-bg::after {
  content: '';
  position: absolute;
  width: 200%; height: 200%;
  top: -50%; left: -50%;
  background-image: radial-gradient(ellipse 3px 8px at 20% 30%, rgba(45,212,176,0.2) 0%, transparent 100%),
    radial-gradient(ellipse 5px 3px at 60% 70%, rgba(96,165,250,0.15) 0%, transparent 100%),
    radial-gradient(ellipse 2px 6px at 80% 20%, rgba(45,212,176,0.18) 0%, transparent 100%);
  animation: caustics 8s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes caustics {
  0%   { transform: rotate(0deg) scale(1); }
  100% { transform: rotate(3deg) scale(1.1); }
}

.meena-close {
  position: absolute;
  top: 16px; right: 16px;
  z-index: 10;
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  color: rgba(255,255,255,0.8);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}

.meena-close:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Mermaid container */
.meena-mermaid-wrap {
  position: absolute;
  bottom: 42%;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  width: 200px;
  opacity: 0;
  transition: transform 1.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.8s ease;
  z-index: 5;
  pointer-events: none;
}

.meena-mermaid-wrap.risen {
  transform: translateX(-50%) translateY(0px);
  opacity: 1;
}

.meena-mermaid-svg {
  width: 200px;
  filter: drop-shadow(0 0 20px rgba(45,212,176,0.6)) drop-shadow(0 0 40px rgba(45,212,176,0.3));
  animation: floatMermaid 4s ease-in-out infinite;
}

@keyframes floatMermaid {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%     { transform: translateY(-12px) rotate(1deg); }
}

/* Glow ring under mermaid */
.meena-glow-ring {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 30px;
  background: radial-gradient(ellipse, rgba(45,212,176,0.4) 0%, transparent 70%);
  border-radius: 50%;
  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
  0%,100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
  50%     { opacity: 1;   transform: translateX(-50%) scaleX(1.2); }
}

/* Chat interface */
.meena-chat-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease 0.3s;
}

.meena-chat-wrap.visible { opacity: 1; pointer-events: auto; }

.meena-chat-header {
  padding: 16px 20px 12px;
  padding-top: max(16px, env(safe-area-inset-top));
  text-align: center;
  flex-shrink: 0;
}

.meena-name-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(45,212,176,0.15);
  border: 0.5px solid rgba(45,212,176,0.4);
  border-radius: 100px;
  padding: 6px 14px 6px 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.3px;
  backdrop-filter: blur(12px);
}

.meena-avatar-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s ease-in-out infinite;
}

.meena-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(45,212,176,0.3) transparent;
}

.meena-messages::-webkit-scrollbar { width: 4px; }
.meena-messages::-webkit-scrollbar-thumb { background: rgba(45,212,176,0.3); border-radius: 2px; }

.meena-msg {
  max-width: 82%;
  border-radius: 16px;
  padding: 10px 14px;
  font-size: 13.5px;
  line-height: 1.55;
  animation: msgPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes msgPop {
  from { opacity:0; transform: scale(0.85) translateY(6px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.meena-msg.agent {
  align-self: flex-start;
  background: rgba(45,212,176,0.12);
  border: 0.5px solid rgba(45,212,176,0.25);
  color: #e0f7f3;
  border-bottom-left-radius: 4px;
}

.meena-msg.user {
  align-self: flex-end;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.15);
  color: var(--text);
  border-bottom-right-radius: 4px;
}

.meena-typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 14px;
  background: rgba(45,212,176,0.08);
  border: 0.5px solid rgba(45,212,176,0.2);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  width: fit-content;
}

.meena-typing span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal);
  opacity: 0.4;
  animation: typingDot 1.2s ease-in-out infinite;
}

.meena-typing span:nth-child(2) { animation-delay: 0.2s; }
.meena-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingDot {
  0%,80%,100% { opacity:0.3; transform:scale(0.8); }
  40%         { opacity:1;   transform:scale(1.2); }
}

/* Typewriter effect */
.typewriter { overflow: hidden; white-space: pre-wrap; }

.meena-input-row {
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(20px);
  border-top: 0.5px solid rgba(45,212,176,0.15);
  flex-shrink: 0;
}

.meena-input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.meena-input:focus { border-color: var(--teal); }
.meena-input::placeholder { color: rgba(255,255,255,0.35); }

.meena-send-btn {
  width: 44px; height: 44px;
  background: var(--teal);
  border: none;
  border-radius: 12px;
  color: #0a1628;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.meena-send-btn:hover { background: #22c4a0; transform: scale(1.05); }
.meena-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Recommended fish chips */
.fish-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 8px;
}

.fish-chip {
  background: rgba(45,212,176,0.15);
  border: 0.5px solid rgba(45,212,176,0.4);
  border-radius: 100px;
  padding: 6px 13px;
  font-size: 12px;
  font-weight: 700;
  color: var(--teal);
  cursor: pointer;
  transition: all 0.15s;
  animation: chipPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

.fish-chip:hover {
  background: var(--teal);
  color: #0a1628;
  transform: scale(1.05);
}

@keyframes chipPop {
  from { opacity:0; transform:scale(0.7); }
  to   { opacity:1; transform:scale(1); }
}

@media (max-width: 520px) {
  .meena-mermaid-wrap { width: 160px; bottom: 43%; }
  .meena-mermaid-svg  { width: 160px; }
}

<!-- ════════════ SCRIPT ════════════ -->
<script>
/* ══════════════════════════════════════
   ⚙️ CONFIG — Edit these values
══════════════════════════════════════
   SHEET_ID        : From your Google Sheet URL
   WA_NUMBER       : WhatsApp number with country code
   APPS_SCRIPT_URL : Deploy URL from Google Apps Script
                     (for writing orders to Sheet2)

   SHEET1 COLUMNS (product catalog):
   A: Product Name  B: Type  C: Category  D: Variant
   E: Price  F: Pieces  G: Gross  H: Net
   I: Serves  J: Cut Size  K: Stock
   L: Image URL  M: Addon Price  N: Extra PPP  O: Ideal For

   SHEET2 COLUMNS (order log — auto-created by Apps Script):
   Timestamp | Name | Phone | Address | Map Link |
   Product | Variant | Add-ons | Qty | Price | Pre-Book | Total
══════════════════════════════════════ */
const CONFIG = {
  SHEET_ID:         '1LdJAHcoYX8ruxVEKG5j-X1KyaZohOLfhyYaUBmsVoyI',
  WA_NUMBER:        '919003346276',
  SHEET_TAB:        'Sheet1',
  APPS_SCRIPT_URL:  'https://script.google.com/macros/s/AKfycby0pnpPx3RmlOIL0aYII06LXqVzC8_86MLhZJp5xh8Mqh-h9MrOrcyVX81qCRexzGkQtg/exec',  // ← paste after deploy
};

/* ══ STATE ══════════════════════════ */
let groups    = [];   // grouped product cards
let cart      = {};   // key: cardId+variantIdx  val: {label,qty,price,extras}
let activeFilter = 'all';
let searchQ      = '';

/* ══ FETCH & PARSE ══════════════════ */
async function load() {
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') {
    document.getElementById('cfg-notice').style.display = 'block';
    document.getElementById('catalog').innerHTML =
      `<div class="state-box">⚙️<br><br>Set your <strong>SHEET_ID</strong> in the CONFIG block to load products.</div>`;
    document.getElementById('updated-time').textContent = 'Not configured';
    return;
  }

  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.SHEET_TAB)}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Cannot reach sheet');
    const csv = await res.text();
    const rows = parseCSV(csv);
    groups = groupProducts(rows);
    render();
    document.getElementById('updated-time').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('catalog').innerHTML =
      `<div class="state-box">🌊<br><br>Could not load stock.<br><small style="color:#aaa">${e.message}</small><br><br>Make sure the sheet is published:<br><small>File → Share → Publish to web → CSV</small></div>`;
    document.getElementById('updated-time').textContent = 'Error';
  }
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitLine(lines[i]);
    if (!c[0] || c[0].trim() === '') continue;
    out.push({
      name:       clean(c[0]),
      type:       clean(c[1]),        // Fish / Prawns / Crab
      category:   clean(c[2]),        // Big Fish / Small Fish / Other
      variant:    clean(c[3]),        // Large Slices / Medium Slices / Whole / etc.
      price:      parseFloat(clean(c[4])) || 0,
      pieces:     clean(c[5]),
      gross:      clean(c[6]),
      net:        clean(c[7]),
      serves:     clean(c[8]),
      cutSize:    clean(c[9]),
      inStock:    clean(c[10]).toLowerCase().includes('in'),
      imageUrl:   clean(c[11]),
      addonPrice: parseFloat(clean(c[12])) || 0,
      extraPPP:   parseFloat(clean(c[13])) || 0,
      idealFor:   clean(c[14]),
      sizeVariant: clean(c[15]),      // 500g / 1kg
    });
  }
  return out;
}

function groupProducts(rows) {
  // Group by Name only — same fish name = one card
  // Within each name, group by variant (Large Slices, Medium Slices, etc.)
  // Within each variant, multiple weight options (500g, 1kg)
  const nameMap = new Map();
  rows.forEach(r => {
    const nameKey = r.name;
    if (!nameMap.has(nameKey)) {
      nameMap.set(nameKey, {
        id:       nameKey.replace(/[^a-zA-Z0-9]/g,'_'),
        name:     r.name,
        type:     r.type,
        category: r.category,
        imageUrl: r.imageUrl,
        idealFor: r.idealFor,
        addonPrice: r.addonPrice,
        extraPPP:   r.extraPPP,
        sliceVariants: [] // [{variant, weights:[]}]
      });
    }
    const card = nameMap.get(nameKey);
    // find or create sliceVariant group
    let sv = card.sliceVariants.find(s => s.variant === r.variant);
    if (!sv) {
      sv = { variant: r.variant, weights: [] };
      card.sliceVariants.push(sv);
    }
    sv.weights.push({
      gross:   r.gross,
      net:     r.net,
      pieces:  r.pieces,
      serves:  r.serves,
      cutSize: r.cutSize,
      price:   r.price,
      inStock: r.inStock,
      sizeVariant: r.sizeVariant,
    });
    // update imageUrl if this row has one and card doesn't yet
    if (!card.imageUrl && r.imageUrl) card.imageUrl = r.imageUrl;
  });
  return Array.from(nameMap.values());
}
  
  function scrollToTop() {
  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
}

function splitLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; }
    else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += line[i]; }
  }
  result.push(cur);
  return result;
}

function clean(s) { return (s||'').replace(/^"|"$/g,'').trim(); }

/* ══ RENDER CATALOG ═════════════════ */
function render() {
  let list = groups;

  if (activeFilter === 'in')
    list = list.filter(g => g.sliceVariants.some(sv => sv.weights.some(w => w.inStock)));
  if (activeFilter === 'out')
    list = list.filter(g => g.sliceVariants.every(sv => sv.weights.every(w => !w.inStock)));
  if (searchQ)
    list = list.filter(g =>
      g.name.toLowerCase().includes(searchQ) ||
      g.sliceVariants.some(sv => sv.variant.toLowerCase().includes(searchQ)) ||
      g.category.toLowerCase().includes(searchQ)
    );

  const cat = document.getElementById('catalog');

  if (!list.length) {
    cat.innerHTML = `<div class="state-box">🐡<br><br>No products found.</div>`;
    return;
  }

  cat.innerHTML = 
  list.map((g, gi) => cardHTML(g, gi)).join('') +
  `
  <div class="catalog-end">
    <p>Catalog complete. You've reached the end.</p>
    <button class="scroll-top-btn" onclick="scrollToTop()">↑ Back to Top</button>
  </div>
  `;
}

function cardHTML(g, gi) {
  const isFish    = g.type.toLowerCase() === 'fish';
  const isBigFish = g.category.toLowerCase().includes('big');
  const cardId    = `card_${gi}`;

  // Default selected slice variant = first
  const firstSV   = g.sliceVariants[0];
  const firstW    = firstSV.weights[0];
  const allOOS    = g.sliceVariants.every(sv => sv.weights.every(w => !w.inStock));

  // Slice variant buttons (Large Slices, Medium Slices, etc.)
  const hasMultiVariants = g.sliceVariants.length > 1;
  const sliceButtons = hasMultiVariants ? g.sliceVariants.map((sv, svi) => `
    <button
      class="slice-var-btn ${svi===0?'sel':''}"
      onclick="selectSliceVariant('${cardId}',${svi})"
    >${sv.variant}</button>
  `).join('') : '';

  // Weight buttons for first slice variant
  const weightButtons = firstSV.weights.map((w, wi) => `
    <button
      class="var-btn ${wi===0?'sel':''} ${!w.inStock?'oos-v':''}"
      onclick="selectWeight('${cardId}',${wi})"
      ${!w.inStock?'title="Out of Stock"':''}
    >
      ${w.sizeVariant || 'Standard'}
    </button>
  `).join('');

  // Addon row
  const addonRow = isFish && g.addonPrice > 0 ? `
    <label class="addon-row" for="${cardId}_addon">
      <input class="addon-cb" type="checkbox" id="${cardId}_addon"
        onchange="updatePrice('${cardId}')">
      <span class="addon-text">Add Head and Tail</span>
      <span class="addon-price">+ ₹${g.addonPrice}</span>
    </label>
  ` : '';

  // Extra pieces
  const extraRow = isBigFish && g.extraPPP > 0 ? `
    <div class="extra-section">
      <label class="extra-toggle" for="${cardId}_extra">
        <input class="extra-cb" type="checkbox" id="${cardId}_extra"
          onchange="toggleExtra('${cardId}')">
        <span class="extra-toggle-text">Need more? Add Extra Pieces</span>
        <span class="extra-toggle-price">+ ₹${g.extraPPP}/pc</span>
      </label>
      <div class="extra-counter" id="${cardId}_ec">
        <button class="ec-btn" onclick="changeExtra('${cardId}',-1)">−</button>
        <div class="ec-val" id="${cardId}_eval">1</div>
        <button class="ec-btn" onclick="changeExtra('${cardId}',1)">+</button>
        <span class="ec-label">piece(s)</span>
      </div>
    </div>
  ` : '';

  const idealRow = g.idealFor ? `<div class="ideal-row"><strong>Ideal for:</strong> ${g.idealFor}</div>` : '';

  const imgHTML = g.imageUrl
    ? `<img class="card-img" src="${g.imageUrl}" alt="${g.name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  return `
  <div class="card ${allOOS?'oos':''}" id="${cardId}" style="animation-delay:${gi*0.04}s">
    <div class="card-img-wrap">
      ${imgHTML}
      <div class="card-img-placeholder" ${g.imageUrl?'style="display:none"':''}">🐟</div>
      <span class="stock-tag ${firstW.inStock?'in':'out'}" id="${cardId}_stag">
      ${firstW.inStock?'✓ In Stock':'📋 Pre-Book'}
      </span>
    </div>

    <div class="card-body">
      <div class="card-name">${g.name}</div>

      <!-- Slice variant buttons (Large/Medium Slices) -->
      ${hasMultiVariants ? `
        <div class="slice-variant-row" id="${cardId}_svbtns">${sliceButtons}</div>
      ` : `<div class="card-variant-label">${firstSV.variant}</div>`}

      <!-- Dynamic specs -->
      <div class="specs" id="${cardId}_specs">
        ${specsHTML(firstW)}
      </div>

      <!-- Weight selector -->
      ${firstSV.weights.length > 1 ? `
        <div class="variant-section">
          <div class="variant-label-row">Select Weight</div>
          <div class="variant-buttons" id="${cardId}_vbtns">
            ${weightButtons}
          </div>
        </div>
      ` : `<div class="variant-buttons" id="${cardId}_vbtns" style="display:none">${weightButtons}</div>`}

      <!-- Price -->
      <div class="price-row">
        <span class="price-main" id="${cardId}_price">₹${firstW.price}</span>
        <span class="price-note">(Incl. GST &amp; FREE delivery)</span>
      </div>

      ${addonRow}
      ${extraRow}
      ${idealRow}

      <div class="delivery-row"><strong>Delivery time:</strong> ${allOOS ? 'Ships as soon as available' : 'Immediately available'}</div>

      <div class="card-footer">
        <div class="qty-ctrl" id="${cardId}_qty">
          <button class="qc-btn" onclick="changeQty('${cardId}',-1)">−</button>
          <div class="qc-val" id="${cardId}_qval">1</div>
          <button class="qc-btn" onclick="changeQty('${cardId}',1)">+</button>
        </div>
        <button class="add-btn ${allOOS?'prebook-btn':''}" id="${cardId}_addbtn"
          onclick="addToCart('${cardId}')">
          ${allOOS?'📋 Pre-Book':'Add'}
        </button>
      </div>
    </div>
  </div>`;
}

function specsHTML(w) {
  const parts = [];
  if (w.gross)   parts.push(`<span class="spec-item"><span class="spec-label">Gross:</span><span class="spec-val">${w.gross}</span></span>`);
  if (w.net)     parts.push(`<span class="spec-item"><span class="spec-label">Net:</span><span class="spec-val">${w.net}</span></span>`);
  if (w.pieces)  parts.push(`<span class="spec-item"><span class="spec-label">Pieces:</span><span class="spec-val">${w.pieces}</span></span>`);
  if (w.serves)  parts.push(`<span class="spec-item"><span class="spec-label">Serves:</span><span class="spec-val">${w.serves}</span></span>`);
  if (w.cutSize) parts.push(`<span class="spec-item"><span class="spec-label">Cut:</span><span class="spec-val">${w.cutSize}</span></span>`);
  return parts.join('');
}

/* ══ SLICE VARIANT & WEIGHT SELECTION ══════════════ */
const selSliceVariant = {}; // cardId -> sliceVariant index
const selVariant = {};      // cardId -> weight index within current slice variant

function getCurrentSV(cardId, g) {
  const svi = selSliceVariant[cardId] || 0;
  return g.sliceVariants[svi];
}

function getCurrentW(cardId, g) {
  const sv = getCurrentSV(cardId, g);
  const wi = selVariant[cardId] || 0;
  return sv.weights[wi] || sv.weights[0];
}

function selectSliceVariant(cardId, svi) {
  const g = getGroupByCardId(cardId);
  if (!g) return;
  selSliceVariant[cardId] = svi;
  selVariant[cardId] = 0; // reset weight selection

  const sv = g.sliceVariants[svi];
  const w  = sv.weights[0];

  // Update slice variant buttons
  document.querySelectorAll(`#${cardId}_svbtns .slice-var-btn`).forEach((b, i) =>
    b.classList.toggle('sel', i === svi));

  // Rebuild weight buttons
  const vbtnsEl = document.getElementById(cardId + '_vbtns');
  if (vbtnsEl) {
    if (sv.weights.length > 1) {
      vbtnsEl.style.display = '';
      vbtnsEl.innerHTML = sv.weights.map((ww, wi) => `
        <button class="var-btn ${wi===0?'sel':''} ${!ww.inStock?'oos-v':''}"
          onclick="selectWeight('${cardId}',${wi})"
          ${!ww.inStock?'title="Out of Stock"':''}>
          ${ww.sizeVariant || 'Standard'}
        </button>
      `).join('');
    } else {
      vbtnsEl.style.display = 'none';
    }
  }

  // Show variant section wrapper only if needed
  const varSection = vbtnsEl?.closest('.variant-section');
  if (varSection) varSection.style.display = sv.weights.length > 1 ? '' : 'none';

  updateSpecsAndStock(cardId, g, w);
  updatePrice(cardId);
}

function selectWeight(cardId, wi) {
  const g = getGroupByCardId(cardId);
  if (!g) return;
  selVariant[cardId] = wi;

  const sv = getCurrentSV(cardId, g);
  const w  = sv.weights[wi];

  // Update weight buttons
  const btns = document.querySelectorAll(`#${cardId}_vbtns .var-btn`);
  btns.forEach((b, i) => b.classList.toggle('sel', i === wi));

  updateSpecsAndStock(cardId, g, w);
  updatePrice(cardId);
}

function updateSpecsAndStock(cardId, g, w) {
  // Update specs
  const specsEl = document.getElementById(cardId + '_specs');
  if (specsEl) specsEl.innerHTML = specsHTML(w);

  // Update stock tag
  const tag = document.getElementById(cardId + '_stag');
  if (tag) {
    tag.className = 'stock-tag ' + (w.inStock ? 'in' : 'out');
    tag.textContent = w.inStock ? '✓ In Stock' : '📋 Pre-Book';
  }

  // Update add button
  const btn = document.getElementById(cardId + '_addbtn');
  if (btn && !btn.classList.contains('added')) {
    btn.disabled = false;
    if (!w.inStock) {
      btn.textContent = '📋 Pre-Book';
      btn.classList.add('prebook-btn');
    } else {
      btn.textContent = 'Add';
      btn.classList.remove('prebook-btn');
    }
  }

  // Update card oos class
  const card = document.getElementById(cardId);
  if (card) card.classList.toggle('oos', !w.inStock);
}

// Backward-compat alias
function selectVariant(cardId, wi) { selectWeight(cardId, wi); }

function getGroupByCardId(cardId) {
  const idx = parseInt(cardId.replace('card_',''));
  // Find in current rendered groups
  const cat = document.getElementById('catalog');
  const cards = cat.querySelectorAll('.card');
  let gi = 0;
  for (const c of cards) {
    if (c.id === cardId) break;
    gi++;
  }
  // Walk rendered groups
  let list = getFilteredGroups();
  return list[gi] || null;
}

function getFilteredGroups() {
  let list = groups;
  if (activeFilter === 'in')  list = list.filter(g => g.sliceVariants.some(sv => sv.weights.some(w => w.inStock)));
  if (activeFilter === 'out') list = list.filter(g => g.sliceVariants.every(sv => sv.weights.every(w => !w.inStock)));
  if (searchQ) list = list.filter(g =>
    g.name.toLowerCase().includes(searchQ) ||
    g.sliceVariants.some(sv => sv.variant.toLowerCase().includes(searchQ)) ||
    g.category.toLowerCase().includes(searchQ)
  );
  return list;
}

/* ══ PRICE CALCULATION ══════════════ */
function updatePrice(cardId) {
  const g = getGroupByCardId(cardId);
  if (!g) return;
  const w = getCurrentW(cardId, g);
  let total = w.price;

  const addonCb = document.getElementById(cardId + '_addon');
  if (addonCb && addonCb.checked) total += g.addonPrice;

  const extraCb = document.getElementById(cardId + '_extra');
  if (extraCb && extraCb.checked) {
    const eVal = parseInt(document.getElementById(cardId + '_eval')?.textContent) || 1;
    total += eVal * g.extraPPP;
  }

  const priceEl = document.getElementById(cardId + '_price');
  if (priceEl) priceEl.textContent = '₹' + total;
}

/* ══ EXTRA PIECES ═══════════════════ */
const extraVals = {};

function toggleExtra(cardId) {
  const cb = document.getElementById(cardId + '_extra');
  const ec = document.getElementById(cardId + '_ec');
  if (ec) ec.classList.toggle('show', cb.checked);
  if (!extraVals[cardId]) extraVals[cardId] = 1;
  updatePrice(cardId);
}

function changeExtra(cardId, delta) {
  if (!extraVals[cardId]) extraVals[cardId] = 1;
  extraVals[cardId] = Math.min(5, Math.max(1, extraVals[cardId] + delta));
  const el = document.getElementById(cardId + '_eval');
  if (el) el.textContent = extraVals[cardId];
  updatePrice(cardId);
}

/* ══ CART ═══════════════════════════ */
const qtyVals = {};

function addToCart(cardId) {
  const g = getGroupByCardId(cardId);
  if (!g) return;
  const svi = selSliceVariant[cardId] || 0;
  const wi  = selVariant[cardId] || 0;
  const sv  = g.sliceVariants[svi];
  const w   = sv.weights[wi];
  const isPreBook = !w.inStock;

  const addonCb  = document.getElementById(cardId + '_addon');
  const extraCb  = document.getElementById(cardId + '_extra');
  const extraQty = extraVals[cardId] || 1;

  const addonOn  = addonCb && addonCb.checked;
  const extraOn  = extraCb && extraCb.checked;

  const basePrice = w.price
    + (addonOn ? g.addonPrice : 0)
    + (extraOn ? extraQty * g.extraPPP : 0);

  const key = cardId + '_' + svi + '_' + wi;
  const label = `${g.name} – ${sv.variant} (${w.gross} / Net ${w.net})`;
  const details = [];
  if (addonOn) details.push(`Head & Tail +₹${g.addonPrice}`);
  if (extraOn) details.push(`${extraQty} extra piece(s) +₹${extraQty * g.extraPPP}`);

  if (cart[key]) {
    cart[key].qty++;
    syncExtraState(cardId, cart[key].qty);
  } else {
    cart[key] = {
      label, details: details.join(', '),
      qty: 1, unitPrice: basePrice,
      basePrice: w.price,
      addonOn, extraOn, extraQty,
      preBook: isPreBook,
    };
  }

  const btn = document.getElementById(cardId + '_addbtn');
  const qc  = document.getElementById(cardId + '_qty');
  if (btn) { btn.style.display = 'none'; }
  if (qc)  { qc.classList.add('show'); }
  const qval = document.getElementById(cardId + '_qval');
  if (qval) qval.textContent = cart[key].qty;

  updateFAB();
}

function changeQty(cardId, delta) {
  const svi = selSliceVariant[cardId] || 0;
  const wi  = selVariant[cardId] || 0;
  const key = cardId + '_' + svi + '_' + wi;
  if (!cart[key]) return;
  cart[key].qty = Math.max(0, cart[key].qty + delta);
  const qval = document.getElementById(cardId + '_qval');
  if (qval) qval.textContent = cart[key].qty;

  if (cart[key].qty === 0) {
    delete cart[key];
    const btn = document.getElementById(cardId + '_addbtn');
    const qc  = document.getElementById(cardId + '_qty');
    if (btn) { btn.style.display = ''; btn.textContent = 'Add'; }
    if (qc)  { qc.classList.remove('show'); }
    syncExtraState(cardId, 1);
  } else {
    syncExtraState(cardId, cart[key].qty);
  }

  updateFAB();
}

// Enable/disable extra pieces based on qty
function syncExtraState(cardId, qty) {
  const extraCb = document.getElementById(cardId + '_extra');
  const extraEc = document.getElementById(cardId + '_ec');
  if (!extraCb) return;

  if (qty >= 2) {
    extraCb.checked  = false;
    extraCb.disabled = true;
    if (extraEc) extraEc.classList.remove('show');

    const svi = selSliceVariant[cardId] || 0;
    const wi  = selVariant[cardId] || 0;
    const key = cardId + '_' + svi + '_' + wi;
    if (cart[key] && cart[key].extraOn) {
      const g         = getGroupByCardId(cardId);
      const sv        = g?.sliceVariants[svi];
      const w         = sv?.weights[wi];
      const addonCb   = document.getElementById(cardId + '_addon');
      const addonOn   = addonCb?.checked || cart[key].addonOn;
      cart[key].extraOn   = false;
      cart[key].extraQty  = 0;
      cart[key].unitPrice = (w?.price || cart[key].basePrice)
                          + (addonOn ? (g?.addonPrice || 0) : 0);
      const details = [];
      if (addonOn && g?.addonPrice) details.push(`Head & Tail +₹${g.addonPrice}`);
      cart[key].details = details.join(', ');
    }

    const toggle = extraCb.closest('.extra-toggle');
    if (toggle) {
      toggle.style.opacity = '0.4';
      toggle.style.cursor  = 'not-allowed';
      toggle.title = 'Extra pieces only available for Qty 1';
    }
  } else {
    extraCb.disabled = false;
    const toggle = extraCb.closest('.extra-toggle');
    if (toggle) {
      toggle.style.opacity = '';
      toggle.style.cursor  = '';
      toggle.title = '';
    }
  }
}

function removeFromCart(key) {
  delete cart[key];
  updateFAB();
  renderDrawer();
}

function updateFAB() {
  const total = Object.values(cart).reduce((s,i) => s + i.qty, 0);
  document.getElementById('cart-badge').textContent = total;
  document.getElementById('cart-fab').classList.toggle('show', total > 0);
}

/* ══ DRAWER ═════════════════════════ */
function openDrawer() {
  renderDrawer();

  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawer() {
  const items = Object.entries(cart);
  const body  = document.getElementById('drawer-body');

  if (!items.length) {
    body.innerHTML = `<div class="empty-cart"><div class="big">🐡</div>Your order is empty.<br>Add some fresh catch!</div>`;
    document.getElementById('total-val').textContent = '₹0';
    return;
  }

  // Only in-stock items contribute to paid total
  let grandTotal = 0;

  body.innerHTML = items.map(([key, item]) => {
    const baseP = item.basePrice || item.unitPrice;
    if (item.preBook) {
      // Pre-book — show name + PRE-BOOK tag, no price charged
      return `
        <div class="order-item">
          <div class="oi-info">
            <div class="oi-name">📋 ${item.label} <span style="background:rgba(96,165,250,0.15);color:#60a5fa;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:0.3px">PRE-BOOK</span></div>
            <div class="oi-detail">Qty: ${item.qty} · Price collected on delivery</div>
          </div>
          <div class="oi-price" style="color:var(--text3);font-size:12px;">Pre-Book</div>
          <button class="rm-btn" onclick="removeFromCart('${key}')">✕</button>
        </div>
      `;
    } else {
      const lineTotal = item.qty * item.unitPrice;
      grandTotal += lineTotal;
      return `
        <div class="order-item">
          <div class="oi-info">
            <div class="oi-name">${item.label}</div>
            <div class="oi-detail">
              Qty: ${item.qty} × ₹${baseP}
              ${item.details ? '<br>Add-ons: ' + item.details : ''}
            </div>
          </div>
          <div class="oi-price">₹${lineTotal.toLocaleString('en-IN')}</div>
          <button class="rm-btn" onclick="removeFromCart('${key}')">✕</button>
        </div>
      `;
    }
  }).join('');

  document.getElementById('total-val').textContent =
    '₹' + grandTotal.toLocaleString('en-IN');
}

/* ══ GEOLOCATION ════════════════════ */
function getLocation() {
  const btn = document.querySelector('.loc-btn');
  btn.textContent = '📍 Getting…';
  btn.disabled = true;
  if (!navigator.geolocation) {
    alert('Geolocation not supported on this browser.');
    btn.textContent = '📍 Get Location'; btn.disabled = false; return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const mapsUrl = `https://maps.google.com/?q=${lat},${lng}`;
      document.getElementById('cust-maploc').value = mapsUrl;
      btn.textContent = '✅ Got It'; btn.disabled = false;
    },
    err => {
      alert('Could not get location. Please paste your Google Maps link manually.');
      btn.textContent = '📍 Get Location'; btn.disabled = false;
    },
    { timeout: 10000 }
  );
}

/* ══ ORDER ID — Sequential via Apps Script ═══════════ */
async function genOrderId() {
  try {
    // Apps Script doGet returns { nextId: "TS-0042" }
    const url = CONFIG.APPS_SCRIPT_URL + '?action=nextId&v=' + Date.now();
    const res  = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data.nextId) return data.nextId;
    throw new Error('no nextId');
  } catch(e) {
    // Fallback: random 4-digit to avoid blank
    console.warn('genOrderId fallback:', e.message);
    return 'TSF-' + String(Math.floor(1000 + Math.random() * 9000));
  }
}

/* ══ LOCALSTORAGE PROFILE ═══════════ */
function saveProfile() {
  const p = {
    name:    document.getElementById('cust-name').value.trim(),
    phone:   document.getElementById('cust-phone').value.trim(),
    address: document.getElementById('cust-address').value.trim(),
  };
  if (p.name) localStorage.setItem('trusea_profile', JSON.stringify(p));
}

function loadProfile() {
  try {
    const p = JSON.parse(localStorage.getItem('trusea_profile') || '{}');
    if (p.name)    document.getElementById('cust-name').value    = p.name;
    if (p.phone)   document.getElementById('cust-phone').value   = p.phone;
    if (p.address) document.getElementById('cust-address').value = p.address;
  } catch(e) {}
}

/* ══ WHATSAPP + SHEET LOG ═══════════ */
async function sendWA() {
  const items = Object.entries(cart);
  if (!items.length) { alert('Please add items to your order first!'); return; }

  const name    = document.getElementById('cust-name').value.trim();
  const phone   = document.getElementById('cust-phone').value.trim();
  const address = document.getElementById('cust-address').value.trim();
  const mapLoc  = document.getElementById('cust-maploc').value.trim();

  if (!name)    { document.getElementById('cust-name').focus(); alert('Please enter your name'); return; }
  if (!phone)   { document.getElementById('cust-phone').focus(); alert('Please enter your phone number'); return; }
  if (!address) { document.getElementById('cust-address').focus(); alert('Please enter your delivery address'); return; }

  saveProfile();

  const orderId  = await genOrderId();
  const date     = new Date().toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});

  // Separate in-stock and pre-book items
  const inStockItems  = items.filter(([, i]) => !i.preBook);
  const preBookItems  = items.filter(([, i]) =>  i.preBook);

  // Grand total — only in-stock items
  let grandTotal = 0;
  let waLines = '';

  inStockItems.forEach(([, item]) => {
    const baseP  = item.basePrice || item.unitPrice;
    const lt     = item.qty * item.unitPrice;
    grandTotal  += lt;
    waLines += `• ${item.label}\n`;
    waLines += `  Qty: ${item.qty} × ₹${baseP}\n`;
    if (item.details) waLines += `  Add-ons: ${item.details}\n`;
    waLines += `  Sub-total: *₹${lt.toLocaleString('en-IN')}*\n`;
  });

  if (preBookItems.length) {
    waLines += `\n📋 *Pre-Book Items (price on delivery):*\n`;
    preBookItems.forEach(([, item]) => {
      waLines += `• ${item.label} — Qty: ${item.qty}\n`;
    });
  }

  const hasPreBook = preBookItems.length > 0;
  let msg  = `*TruSea Fish — ${hasPreBook ? 'Order + Pre-Book' : 'Fresh Order'}*\n`;
  msg     += `Order ID: *${orderId}*\n`;
  msg     += `${date}\n`;
  msg     += `*${name}* | ${phone}\n`;
  msg     += `${address}\n`;
  if (mapLoc) msg += `🗺️ ${mapLoc}\n`;
  msg     += `\n*Order Summary:*\n${waLines}\n`;
  msg     += `*Order Total: ₹${grandTotal.toLocaleString('en-IN')}*\n`;
  msg     += `_(Incl. GST & FREE delivery)_\n`;
  if (hasPreBook) msg += `_Pre-book items will be charged on delivery_\n`;
  msg     += `\n_Sent via TruSea Fresh · ${orderId}_`;

  window.open(`https://wa.me/${CONFIG.WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  logToSheet({ orderId, name, phone, address, mapLoc, inStockItems, preBookItems, grandTotal });
}

async function logToSheet({ orderId, name, phone, address, mapLoc, inStockItems, preBookItems, grandTotal }) {
  if (CONFIG.APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;

  const status = document.getElementById('submit-status');
  status.textContent = '⏳ Saving order…';
  status.style.color = 'var(--text3)';

  const timestamp = new Date().toLocaleString('en-IN');

  // Build single row per order
  const inStockNames = inStockItems.map(([, i]) => i.label).join(' | ');
  // ⚠️ Keep empty strings — index must match product index
  // Seer(no addon)="" | Baracuda(addon)="Head & Tail +₹199"
  const addonsAll    = inStockItems.map(([, i]) => i.details || '').join(' | ');
  const preBookNames = preBookItems.map(([, i]) => i.label).join(' | ');

  // Price format: ₹unitPrice×qty+₹addonAmt
  // This allows dashboard to extract qty, unit price, and addon separately
  const priceBreakdown = inStockItems.map(([, i]) => {
    const baseP    = i.basePrice || i.unitPrice;
    const addonAmt = i.unitPrice - baseP; // addon per unit
    // Embed qty in price: ₹1380×2+₹199 or ₹1380×1+₹199 or ₹1380×2
    let seg = `₹${baseP}×${i.qty}`;
    if (addonAmt > 0) seg += `+₹${addonAmt}`;
    return seg;
  }).join(' | ');

  const orderRow = {
    timestamp,
    orderId,
    name, phone, address,
    mapLink:    mapLoc || '',
    product:    inStockNames,
    addons:     addonsAll || '',
    preBook:    preBookNames || '',
    price:      priceBreakdown,
    orderTotal: grandTotal,
  };

  try {
    await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orders: [orderRow] }),
    });
    status.textContent = `✅ Order ${orderId} saved!`;
    status.style.color = 'var(--teal)';
  } catch(e) {
    status.textContent = '⚠️ Could not save to sheet (order still sent via WA)';
    status.style.color = '#b45309';
  }
}

function openMeena() {
  const overlay = document.getElementById('meena-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => {
    overlay.classList.add('open');
    requestAnimationFrame(() => overlay.classList.add('visible'));
  });
  
  // Generate bubbles
  const bubbles = document.getElementById('meena-bubbles');
  bubbles.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 4 + Math.random() * 16;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:${-size}px;
      animation-duration:${4 + Math.random()*6}s;
      animation-delay:${Math.random()*4}s;
    `;

  }

  // Reset chat

function closeMeena() {
  const overlay = document.getElementById('meena-overlay');
  overlay.classList.remove('visible');
  setTimeout(() => {
    overlay.classList.remove('open');
    overlay.style.display = 'none';
    document.getElementById('meena-mermaid').classList.remove('risen');
    document.getElementById('meena-chat').classList.remove('visible');

}

function addMeenaMsg(text, role, typewriter = false) {
  const msgs = document.getElementById('meena-messages');

  // Check for fish chips in text
  let fishChips = null;
  let displayText = text;
  const chipMatch = text.match(/FISHCHIPS:(\[.*?\])/);
  if (chipMatch) {
    try { fishChips = JSON.parse(chipMatch[1]); } catch(e) {}
    displayText = text.replace(/FISHCHIPS:\[.*?\]/, '').trim();
    meenaAwaitingFishClick = true;
  }

  const div = document.createElement('div');
  div.className = `meena-msg ${role}`;

  if (typewriter && role === 'agent') {
    div.textContent = '';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    let i = 0;
    const speed = 18;
    function type() {
      if (i < displayText.length) {
        div.textContent += displayText[i++];
        msgs.scrollTop = msgs.scrollHeight;
        setTimeout(type, speed);
      } else if (fishChips) {
        addFishChips(fishChips, msgs);
      }
    }
    setTimeout(type, 10);
  } else {
    div.textContent = displayText;
    msgs.appendChild(div);
    if (fishChips) addFishChips(fishChips, msgs);
    msgs.scrollTop = msgs.scrollHeight;
  }
}

function addFishChips(chips, msgs) {
  const chipRow = document.createElement('div');
  chipRow.className = 'fish-chips';
  chips.forEach((fish, i) => {
    const chip = document.createElement('button');
    chip.className = 'fish-chip';
    chip.textContent = '🐟 ' + fish;
    chip.style.animationDelay = (i * 0.08) + 's';
    chip.onclick = () => onFishChipClick(fish);
    chipRow.appendChild(chip);
  });
  msgs.appendChild(chipRow);
  msgs.scrollTop = msgs.scrollHeight;
}

function onFishChipClick(fishName) {
  closeMeena();
  // Find the fish card and scroll to it
  setTimeout(() => {
    // Search by fish name
    searchQ = '';
    activeFilter = 'all';
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
    document.querySelector('.pill').classList.add('on');
    
    // Try to find matching card
    const allCards = document.querySelectorAll('.card');
    let found = null;
    for (const card of allCards) {
      const nameEl = card.querySelector('.card-name');
      if (nameEl && nameEl.textContent.toLowerCase().includes(fishName.toLowerCase().split('(')[0].trim().toLowerCase())) {
        found = card;
        break;
      }
    }
    if (found) {
      found.scrollIntoView({ behavior: 'smooth', block: 'center' });
      // Highlight effect
      found.style.transition = 'box-shadow 0.3s, border-color 0.3s';
      found.style.boxShadow = '0 0 0 3px rgba(45,212,176,0.7), 0 12px 40px rgba(45,212,176,0.4)';
      found.style.borderColor = 'var(--teal)';
      setTimeout(() => {
        found.style.boxShadow = '';
        found.style.borderColor = '';
      }, 2500);
    } else {
      // Search for it
      const input = document.getElementById('search-input');
      const cleanName = fishName.split('(')[0].trim();
      if (input) {
        input.classList.add('open');
        input.value = cleanName;
        doSearch(cleanName);
      }
    }
  }, 500);
}

async function sendMeenaMsg() {
  if (meenaTyping) return;
  const input = document.getElementById('meena-input');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  addMeenaMsg(text, 'user');
  meenaHistory.push({ role: 'user', content: text });

  // Show typing indicator
  const msgs = document.getElementById('meena-messages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'meena-typing';
  typingDiv.id = 'meena-typing-indicator';
  typingDiv.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(typingDiv);
  msgs.scrollTop = msgs.scrollHeight;

  meenaTyping = true;
  document.getElementById('meena-send').disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: MEENA_SYSTEM,
        messages: meenaHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'The ocean whispers… please try again 🌊';
    
    // Remove typing indicator
    document.getElementById('meena-typing-indicator')?.remove();
    
    meenaHistory.push({ role: 'assistant', content: reply });
    addMeenaMsg(reply, 'agent', true);
  } catch(e) {
    document.getElementById('meena-typing-indicator')?.remove();
    addMeenaMsg('The ocean waves interrupted us 🌊 Please try again!', 'agent');
  }

  meenaTyping = false;
  document.getElementById('meena-send').disabled = false;
}
